site_name: GestorPro — Documentación Oficial
site_description: Documentación completa del gestor de tareas GestorPro, desarrollado con Streamlit y Supabase.
site_author: Equipo GestorPro — UTEDÉ Segundo Semestre

theme:
  name: material
  language: es
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - def_list

nav:
  - Inicio: index.md
  - Integrantes: integrantes.md
  - Instalación: instalacion.md
  - Arquitectura: arquitectura.md
  - Módulos:
      - app.py: modulos/app.md
      - database.py: modulos/database.md
      - logic.py: modulos/logic.md
  - Guía de Uso: guia.md
  - Guía MkDocs: guia_mkdocs.md
